services:
  # ── 단일 Web Service (백엔드 + 프론트엔드 통합) ──────────────
  - type: web
    name: family-asset-manager
    runtime: node
    rootDir: .
    buildCommand: >
      pip3 install msoffcrypto-tool &&
      cd frontend && npm install && npm run build &&
      cd ../backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/assets.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
