services:
  # ── 백엔드 Web Service ──────────────────────────────
  - type: web
    name: family-asset-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/assets.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
